- title: "RaQuN: A Generic and Scalable n-Way Model Matching Algorithm"
  authors: "A. Schultheiß, P. Bittner, A. Boll, L. Grunske, T. Thüm, T. Kehrer"
  venue: "SoSyM"
  year: 2022
  type: journal
  doi: "10.1007/s10270-022-01062-5"
  pdf: "publications/RaQuN_a_generic_and_scalable_n-way_model_matching_algorithm.pdf"
  abstract: "Model matching algorithms are used to identify common elements in input models, which is a fundamental precondition for many software engineering tasks, such as merging software variants or views. If there are multiple input models, an n-way matching algorithm that simultaneously processes all models typically produces better results than the sequential application of two-way matching algorithms. However, existing algorithms for n-way matching do not scale well, as the computational effort grows fast in the number of models and their size. We propose a scalable n-way model matching algorithm, which uses multi-dimensional search trees for efficiently finding suitable match candidates through range queries. We implemented our generic algorithm named RaQuN   (Range Queries on input models) in Java and empirically evaluate the matching quality and runtime performance on several datasets of different origins and model types. Compared to the state of the art, our experimental results show a performance improvement by an order of magnitude, while delivering matching results of better quality."
  bib: "publications/RaQuN_a_generic_and_scalable_n-way_model_matching_algorithm.bib"

- title: "Replicability of Experimental Tool Evaluations in Model-Based Software and Systems Engineering with MATLAB/Simulink"
  authors: "A. Boll, N. Vieregg, T. Kehrer"
  venue: "ISSE"
  year: 2022
  type: journal
  doi: "10.1007/s11334-022-00442-w"
  pdf: "publications/Replicability_of_experimental_tool_evaluations_in_model-based_software_and_systems_engineering_with_MATLABSimulink.pdf"
  abstract: "Research on novel tools for model-based development differs from a mere engineering task by not only developing a new tool, but by providing some form of evidence that it is effective. This is typically achieved by experimental evaluations. Following principles of good scientific practice, both the tool and the models used in the experiments should be made available along with a paper, aiming at the replicability of experimental results. We investigate to which degree recent research reporting on novel methods, techniques, or algorithms supporting model-based development with MATLAB/Simulink meets the requirements for replicability of experimental results. Our results from studying 65 research papers obtained through a systematic literature search are rather unsatisfactory. In a nutshell, we found that only 31% of the tools and 22% of the models used as experimental subjects are accessible. Given that both artifacts are needed for a replication study, only 9% of the tool evaluations presented in the examined papers can be classified to be replicable in principle. We found none of the experimental results presented in these papers to be fully replicable, and 6% partially replicable. Given that tools are still being listed among the major obstacles of a more widespread adoption of model-based principles in practice, we see this as an alarming signal. While we are convinced that this situation can only be improved as a community effort, this paper is meant to serve as starting point for discussion, based on the lessons learnt from our study."
  bib: "publications/Replicability_of_experimental_tool_evaluations_in_model-based_software_and_systems_engineering_with_MATLABSimulink.bib"

- title: "Characteristics, Potentials, and Limitations of Open Source Simulink Projects for Empirical Research"
  authors: "A. Boll, F. Brokhausen, T. Amorim, A. Vogelsang, T. Kehrer"
  venue: "SoSyM"
  year: 2021
  type: journal
  doi: "10.1007/s10270-021-00883-0"
  pdf: "publications/Characteristics,_Potentials,_and_Limitations_of_Open_Source_Simulink_Projects_for_Empirical_Research.pdf"
  abstract: "Simulink is an example of a successful application of the paradigm of model-based development into industrial practice. Numerous companies create and maintain Simulink projects for modeling software-intensive embedded systems, aiming at early validation and automated code generation. However, Simulink projects are not as easily available as code-based ones, which profit from large publicly accessible open-source repositories, thus curbing empirical research. In this paper, we investigate a set of 1734 freely available Simulink models from 194 projects and analyze their suitability for empirical research. We analyze the projects considering (1) their development context, (2) their complexity in terms of size and organization within projects, and (3) their evolution over time. Our results show that there are both limitations and potentials for empirical research. On the one hand, some application domains dominate the development context, and there is a large number of models that can be considered toy examples of limited practical relevance. These often stem from an academic context, consist of only a few Simulink blocks, and are no longer (or have never been) under active development or maintenance. On the other hand, we found that a subset of the analyzed models is of considerable size and complexity. There are models comprising several thousands of blocks, some of them highly modularized by hierarchically organized Simulink subsystems. Likewise, some of the models expose an active maintenance span of several years, which indicates that they are used as primary development artifacts throughout a project’s lifecycle. According to a discussion of our results with a domain expert, many models can be considered mature enough for quality analysis purposes, and they expose characteristics that can be considered representative for industry-scale models. Thus, we are confident that a subset of the models is suitable for empirical research. More generally, using a publicly available model corpus or a dedicated subset enables researchers to replicate findings, publish subsequent studies, and use them for validation purposes. We publish our dataset for the sake of replicating our results and fostering future empirical research."
  bib: "publications/Characteristics,_Potentials,_and_Limitations_of_Open_Source_Simulink_Projects_for_Empirical_Research.bib"

- title: "On the Replicability of Experimental Tool Evaluations in Model-Based Development"
  authors: "A. Boll, T. Kehrer"
  venue: "ICSMM"
  year: 2020
  type: conference
  doi: "10.1007/978-3-030-58167-1_9"
  pdf: "publications/On_the_Replicability_of_Experimental_Tool_Evaluations_in_Model-based_Development.pdf"
  abstract: "Research on novel tools for model-based development differs from a mere engineering task by providing some form of evidence that a tool is effective. This is typically achieved by experimental evaluations. Following principles of good scientific practice, both the tool and the models used in the experiments should be made available along with a paper. We investigate to which degree these basic prerequisites for the replicability of experimental results are met by recent research reporting on novel methods, techniques, or algorithms supporting model-based development using MATLAB/Simulink. Our results from a systematic literature review are rather unsatisfactory. In a nutshell, we found that only 31% of the tools and 22% of the models used as experimental subjects are accessible. Given that both artifacts are needed for a replication study, only 9% of the tool evaluations presented in the examined papers can be classified to be replicable in principle. Given that tools are still being listed among the major obstacles of a more widespread adoption of model-based principles in practice, we see this as an alarming signal. While we are convinced that this can only be achieved as a community effort, this paper is meant to serve as starting point for discussion, based on the lessons learnt from our study."
  bib: "publications/On_the_Replicability_of_Experimental_Tool_Evaluations_in_Model-based_Development.bib"

- title: "Comparison of Graph-Based Model Transformation Rules"
  authors: "A. Schultheiß, A. Boll, T. Kehrer"
  venue: "JOT"
  year: 2020
  type: journal
  doi: "10.5381/jot.2020.19.2.a3"
  pdf: "publications/Comparison_of_graph-based_model_transformation_rules.pdf"
  abstract: "With model transformations arising to primary development artifacts in Model-Driven Engineering, dedicated tools supporting transformation developers in the development and maintenance of model transfor- mations are strongly required. In this paper, we address the versioning of model transformations, which essentially relies on a basic service for comparing different versions of model transformations, e.g., a local workspace version and the latest version of a repository. Focusing on rule-based model transformations based on graph transformation concepts, we propose to compare such transformation rules using a maximum common subgraph (MCS) algorithm as the underlying matching engine. Although the MCS problem is known as a non-polynomial optimization problem, our research hypothesis is that using an MCS algorithm as a basis for comparing graph-based transformation rules is feasible for real-world model transformations and increases the quality of comparison results compared to standard model comparison algorithms. Experimental results obtained on a benchmark set for model transformation confirm this hypothesis."
  bib: "publications/Comparison_of_graph-based_model_transformation_rules.bib"

- title: "Formale Instanzverifikation zertifizierender verteilter Algorithmen"
  authors: "A. Boll"
  venue: "MSc Thesis (in German)"
  year: 2019
  type: thesis
  pdf: "publications/Diplomarbeit_Formale_Instanzverifikation_zertifizierender_verteilter_Algorithmen.pdf"
  abstract: "We simplify a formal proof framework in COQ for distributed certificating algorithms. We demonstrate this framework on distributed certification of two-colorability for an end-to-end proof."
