- title: "Explaining GitHub Actions Failures with Large Language Models: Challenges, Insights, and Limitations"
  authors: "P. Valenzuela-Toledo, C. Wu, S. Hernández, A. Boll, R. Machacek, S. Panichella, T. Kehrer"
  venue: "ICPC"
  year: 2025
  type: conference
  doi: "10.1109/ICPC66645.2025.00037"
  pdf: "publications/Explaining_GitHub_Actions_Failures_with_Large_Language_Models_Challenges_Insights_and_Limitations.pdf"
  abstract: "GitHub Actions (GA) has become the de facto tool that developers use to automate software workflows, seamlessly building, testing, and deploying code. Yet when GA fails, it disrupts development, causing delays and driving up costs. Diagnosing failures becomes especially challenging because error logs are often long, complex and unstructured. Given these difficulties, this study explores the potential of large language models (LLMs) to generate correct, clear, concise, and actionable contextual descriptions (or summaries) for GA failures, focusing on developers' perceptions of their feasibility and usefulness. Our results show that over 80 % of developers rated LLM explanations positively in terms of correctness for simpler/small logs. Overall, our findings suggest that LLMs can feasibly assist developers in understanding common GA errors, thus, potentially reducing manual analysis. However, we also found that improved reasoning abilities are needed to support more complex CI/CD scenarios. For instance, less experienced developers tend to be more positive on the described context, while seasoned developers prefer concise summaries. Overall, our work offers key insights for researchers enhancing LLM reasoning, particularly in adapting explanations to user expertise."
  bib: "publications/Explaining_GitHub_Actions_Failures_with_Large_Language_Models_Challenges_Insights_and_Limitations.bib"

- title: "Can We Make Code Green? Understanding Trade-Offs in LLMs vs. Human Code Optimizations"
  authors: "P. Rani, J.-A. Bard, J. Sallou, A. Boll, T. Kehrer, A. Bacchelli"
  venue: "arXiv"
  year: 2025
  type: other
  status: preprint
  doi: "10.48550/arXiv.2503.20126"
  pdf: "publications/Can_We_Make_Code_Green_Understanding_Trade-Offs_in_LLMs_vs_Human_Code_Optimizations.pdf"
  abstract: "The rapid technological evolution has accelerated software development for various domains and use cases, contributing to a growing share of global carbon emissions. While recent large language models (LLMs) claim to assist developers in optimizing code for performance and energy efficiency, their efficacy in real-world scenarios remains under exploration. In this work, we explore the effectiveness of LLMs in reducing the environmental footprint of real-world projects, focusing on software written in Matlab-widely used in both academia and industry for scientific and engineering applications. We analyze energy-focused optimization on 400 scripts across 100 top GitHub repositories. We examine potential 2,176 optimizations recommended by leading LLMs, such as GPT-3, GPT-4, Llama, and Mixtral, and a senior Matlab developer, on energy consumption, memory usage, execution time consumption, and code correctness. The developer serves as a real-world baseline for comparing typical human and LLM-generated optimizations.
Mapping these optimizations to 13 high-level themes, we found that LLMs propose a broad spectrum of improvements--beyond energy efficiency--including improving code readability and maintainability, memory management, error handling while the developer overlooked some parallel processing, error handling etc. However, our statistical tests reveal that the energy-focused optimizations unexpectedly negatively impacted memory usage, with no clear benefits regarding execution time or energy consumption. Our qualitative analysis of energy-time trade-offs revealed that some themes, such as vectorization preallocation, were among the common themes shaping these trade-offs. With LLMs becoming ubiquitous in modern software development, our study serves as a call to action: prioritizing the evaluation of common coding practices to identify the green ones. "
  bib: "publications/Can_We_Make_Code_Green_Understanding_Trade-Offs_in_LLMs_vs_Human_Code_Optimizations.bib"

- title: "SMOKE: Simulink Model Obfuscator Keeping Structure"
  authors: "A. Boll, T. Kehrer, M. Goedicke"
