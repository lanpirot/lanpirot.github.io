- title: "Towards Semi-Automated Merge Conflict Resolution: Is It Easier Than We Expected?"
  authors: "A. Boll, Y. van Dok, M. Ohrndorf, A. Schultheiß, T. Kehrer"
  venue: "EASE"
  year: 2024
  type: conference
  award: "Distinguished Paper Award"
  award_url: "https://seg.inf.unibe.ch/news/2024/05/23/ease-2024-distinguished-paper-award/"
  doi: "10.1145/3661167.3661197"
  pdf: "publications/Towards_Semi-Automated_Merge_Conflict_Resolution_Is_It_Easier_Than_We_Expected.pdf"
  abstract: "In version control systems such as Git, concurrent modifications on the same artifacts can cause merge conflicts that may disrupt the development workflow by requiring manual intervention. While research on software merging focused on sophisticated techniques that hardly had any impact in practice, we present an empirical feasibility study on semi-automated conflict resolution using a fixed set of only a few language-agnostic conflict resolution patterns. In a large-scale quantitative analysis, we simulate the performance of our hypothetical conflict resolution strategy by classifying 131,154 merge conflict resolutions of a diverse sample of 10,000 GitHub projects according to these resolution patterns. We shed light on the derivability of merges on multiple levels of granularity: the conflicting merge commit, its conflicting files and their individual conflicting chunks. 87.9% of chunks are derivable individually, while 34.5% of merges are derivable as a whole. Interestingly, however, by inspecting potential factors affecting derivability, we observe that there are stronger correlations considering individual files than considering the entire merge. A short yet preliminary answer to whether semi-automated conflict resolution is easier than we expected is: yes, it might be, particularly if we use the right level of granularity for proposing conflict resolutions. Through our comprehensive analysis, we aspire to bridge the gap between academic innovations on sophisticated merge techniques and real-world merge conflict scenarios, laying the groundwork for more effective and widely accepted automatic merge tools."
  bib: "publications/Towards_Semi-Automated_Merge_Conflict_Resolution_Is_It_Easier_Than_We_Expected.bib"

- title: "Beyond Code: Is There a Difference Between Comments in Visual and Textual Languages?"
  authors: "A. Boll, P. Rani, A. Schultheiß, T. Kehrer"
  venue: "JSS"
  year: 2024
  type: journal
  doi: "10.1016/j.jss.2024.112087"
  pdf: "publications/Beyond_Code_Is_There_a_Difference_Between_Comments.pdf"
  abstract: "Code comments are crucial for program comprehension and maintenance. To better understand the nature and content of comments, previous work proposed taxonomies of comment information for textual languages, notably classical programming languages. However, paradigms such as model-driven or model-based engineering often promote the use of visual languages, to which existing taxonomies are not directly applicable. Taking MATLAB/Simulink as a representative of a sophisticated and widely used modeling environment, we extend a multi-language comment taxonomy onto new (visual) comment types and two new languages: Simulink and MATLAB. Furthermore, we outline Simulink commenting practices and compare them to textual languages. We analyze 259,267 comments from 9095 Simulink models and 17,792 MATLAB scripts. We identify the comment types, their usage frequency, classify comment information, and analyze their correlations with model metrics. We manually analyze 757 comments to extend the taxonomy. We also analyze commenting guidelines and developer adherence to them. Our extended taxonomy, SCoT (Simulink Comment Taxonomy), contains 25 categories. We find that Simulink comments, although often duplicated, are used at all model hierarchy levels. Of all comment types, Annotations are used most often; Notes scarcely. Our results indicate that Simulink developers, instead of extending comments, add new ones, and rarely follow commenting guidelines. Overall, we find Simulink comment information comparable to textual languages, which highlights commenting practice similarity across languages."
  bib: "publications/Beyond_Code_Is_There_a_Difference_Between_Comments.bib"
  links:
    code: "https://github.com/lanpirot/commenter"

- title: "ScoutSL: An Open-Source Simulink Search Engine"
  authors: "S. Shrestha, A. Boll, T. Kehrer, C. Csallner"
  venue: "MODELS"
  year: 2023
  type: conference
  doi: "10.1109/MODELS-C59198.2023.00022"
  pdf: "publications/ScoutSL_An_Open-source_Simulink_Search_Engine.pdf"
  abstract: "Simulink is one of the most widely used modelling languages in safety-critical industries. Most models created in industrial settings are valuable intellectual property to their companies and are thus often not publicly available. But to study Simulink software engineering processes or to develop new Simulink tools, access to models with relevant properties is vital for researchers. We conducted a community survey to find out what kind of models and model metrics are of interest to researchers. With these results, we implemented ScoutSL (http://scoutsl.net), a tool that gives researchers easy online access to over 100k open-source Simulink models from which they can select a subset according to their needs. A short video demonstration is available online at https://youtu.be/HwsHL8LrVCM"
  bib: "publications/ScoutSL_An_Open-source_Simulink_Search_Engine.bib"
  links:
    video: "https://youtu.be/HwsHL8LrVCM"

- title: "EvoSL: A Large Open-Source Corpus of Changes in Simulink Models & Projects"
  authors: "S. Shrestha, A. Boll, S. Chowdhury, T. Kehrer, C. Csallner"
  venue: "MODELS"
  year: 2023
  type: conference
  doi: "10.1109/MODELS58315.2023.00024"
  pdf: "publications/EvoSL_A_Large_Open-Source_Corpus_of_Changes_in_Simulink_Models_&_Projects.pdf"
  abstract: "Having readily available corpora is crucial for performing replication, reproduction, extension, and verification studies of existing research tools and techniques. MAT-LAB/Simulink is a de-facto standard tool in several safety-critical industries for system modeling and analysis, compiling models to code, and deploying code to embedded hardware. There is no commonly used corpus for large-scale model change studies because there is no readily available corpus. EvoSL is the first large corpus of Simulink projects that includes model and project changes and allows redistribution. EvoSL is available under a permissive open-source license and contains its collection and analysis tools. Using a subset of EvoSL, we replicated a case study of model changes on a single closed-source industrial project."
  bib: "publications/EvoSL_A_Large_Open-Source_Corpus_of_Changes_in_Simulink_Models_&_Projects.bib"

- title: "Simulink Bus Usage in Practice: An Empirical Study"
  authors: "T. Amorim, A. Boll, F. Bachmann, T. Kehrer, A. Vogelsang, H. Pohlheim"
  venue: "JOT"
  year: 2023
  type: journal
  doi: "10.5381/jot.2023.22.2.a12"
  pdf: "publications/Simulink_bus_usage_in_practice_an_empirical_study.pdf"
  abstract: "Matlab/Simulink is a graphical modeling environment that has become the de facto standard for the industrial model-based development of embedded systems. Practitioners employ different structuring mechanisms to manage Simulink models’ growing size and complexity. One important architectural element is the so-called bus, which can combine multiple signals into composite ones, thus, reducing a model’s visual complexity. However, when and how to effectively use buses is a non-trivial design problem with several trade-offs. To date, only little guidance exists, often applied in an ad-hoc and subjective manner, leading to suboptimal designs. Using an inductive-deductive research approach, we conducted an exploratory survey among Simulink practitioners and extracted bus usage information from a corpus comprising 433 open-source Simulink models. We elicited 22 hypotheses on bus usage advantages, disadvantages, and best practices from the data, whose validity was later tested through a confirmatory survey. Our findings serve as requirements for static analysis tools and pave the way toward guidelines on bus usage in Simulink."
  bib: "publications/Simulink_bus_usage_in_practice_an_empirical_study.bib"

