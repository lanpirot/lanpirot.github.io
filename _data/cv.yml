summary: >
  Postdoctoral researcher in software engineering, working on merge conflict
  resolution and software variability, with a strong track record in model-based
  software engineering — particularly MATLAB/Simulink. My research develops
  practical tools (SMOKE, GRANDSLAM, ScoutSL) that lower the barrier to empirical
  research in model-based engineering, and studies how developers can be better
  supported in everyday version-control workflows.

