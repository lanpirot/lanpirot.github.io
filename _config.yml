title: Alexander Boll
tagline: Postdoctoral Researcher, University of Bern
description: >
  Alexander Boll — Postdoctoral Researcher at the Software Engineering Group,
  University of Bern. Research on merge conflict resolution, software variability,
  and model-based software engineering with MATLAB/Simulink.
url: "https://lanpirot.github.io"
baseurl: ""
lang: en

author:
  name: Alexander Boll
  email: alexander.boll@unibe.ch

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

collections:
  papers:
    output: true
    permalink: /papers/:name/

defaults:
  - scope:
      path: ""
      type: papers
    values:
      layout: paper
  - scope:
      path: "google*.html"
    values:
      sitemap: false
  - scope:
      path: "dblp-preview.html"
    values:
      sitemap: false

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - .claude

sass:
  style: compressed
