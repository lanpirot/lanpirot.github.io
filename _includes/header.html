{%- assign s = site.data.site -%}
<section id="about" class="header">
  <div class="photo-frame">
    <img class="photo" src="{{ s.photo | relative_url }}" alt="Portrait of {{ s.name }}" width="112" height="112" loading="eager" decoding="async">
  </div>
  <div>
    <h1>{{ s.name }}</h1>
    <p class="role">{{ s.role }} · <a href="{{ s.affiliation_url }}">{{ s.affiliation }}</a> · {{ s.location }}</p>
    <p class="pitch">{{ s.pitch }}</p>
    <div class="socials">
      {%- for link in site.data.socials -%}
        <a href="{{ link.url }}" aria-label="{{ link.name }}" title="{{ link.name }}"{% unless link.icon == "email" or link.icon == "pgp" %} rel="me noopener" target="_blank"{% endunless %}>
          {%- include icon.html name=link.icon -%}
        </a>
      {%- endfor -%}
    </div>
  </div>
</section>
