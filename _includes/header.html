{%- assign s = site.data.site -%}
<section id="about" class="header">
  <div class="photo-col">
    <div class="photo-frame">
      <img class="photo" src="{{ s.photo | relative_url }}" alt="Portrait of {{ s.name }}" width="112" height="112" loading="eager" decoding="async">
    </div>
    <a class="view-cv" href="{{ '/cv/' | relative_url }}">
      <span>View CV</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </a>
  </div>
  <div>
    <h1>{{ s.name }}</h1>
    <p class="role">{{ s.role }} · <a href="{{ s.affiliation_url }}">{{ s.affiliation }}</a> · {{ s.location }}</p>
    <p class="pitch">{{ s.pitch }}</p>
    <div class="socials">
      {%- for link in site.data.socials -%}
        <a href="{{ link.url }}" aria-label="{{ link.name }}" title="{{ link.name }}"{% unless link.icon == "email" or link.icon == "pgp" or link.icon == "cv" %} rel="me noopener" target="_blank"{% endunless %}>
          {%- include icon.html name=link.icon -%}
        </a>
      {%- endfor -%}
    </div>
  </div>
</section>
