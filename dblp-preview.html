<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>dblp logo themed preview</title>
<style>
  :root {
    --bg: #f4f1e8;
    --fg: #0b1220;
    --muted: #5a6478;
  }
  .dark {
    --bg: #0b1220;
    --fg: #f4f1e8;
    --muted: #8b93a7;
  }
  body { margin: 0; font-family: system-ui, sans-serif; }
  .row { display: flex; }
  .panel {
    flex: 1;
    padding: 3rem;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    box-sizing: border-box;
  }
  .panel h2 { margin: 0 0 1rem; font-weight: 500; }
  .panel .stage {
    display: flex;
    gap: 2rem;
    align-items: center;
    flex-wrap: wrap;
  }
  .panel svg { display: block; }
  .size-l { width: 220px; height: auto; }
  .size-m { width: 96px; height: auto; }
  .size-s { width: 32px; height: auto; }
  .chip {
    display: inline-block; padding: .25rem .6rem; border: 1px solid var(--muted);
    border-radius: 4px; font-size: .8rem; color: var(--muted);
  }
</style>
</head>
<body>

<template id="tpl-dblp">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="-25.1404 0 232.79972 232.79972">
    <!-- background = fg, padded to square -->
    <rect x="-25.1404" y="0" width="232.79972" height="232.79972" fill="var(--fg)"/>
    <g transform="translate(-12.972068,1.6083394)">
      <!-- right parallelograms: was yellow -> secondary (muted) w/ translucency -->
      <path d="M 169.5185,47.748551 86.640497,85.521869 113.75488,183.39175 195.49099,145.00831 Z"
            fill="var(--muted)" fill-opacity="0.85"/>
      <!-- left parallelograms: was blue -> bg w/ translucency -->
      <path d="M 95.850974 47.430723 L 12.972068 85.204161 L 40.087302 183.0733 L 121.82168 144.69049 L 95.850974 47.430723 z"
            fill="var(--bg)" fill-opacity="0.5"/>
      <path d="m 86.650106,85.474824 27.116884,97.881676 78.23633,47.53321 -26.08008,-96.48633 z"
            fill="var(--muted)" fill-opacity="0.85"/>
      <path d="M 16.79824,-2.0458394 43.692771,96.39752 121.80826,144.66096 95.847068,47.444395 Z"
            fill="var(--bg)" fill-opacity="0.5"/>
    </g>
  </svg>
</template>

<div class="row">
  <section class="panel">
    <h2>Light theme <span class="chip">fg bg | bg left | muted right</span></h2>
    <div class="stage">
      <div class="size-l"></div>
      <div class="size-m"></div>
      <div class="size-s"></div>
    </div>
  </section>
  <section class="panel dark">
    <h2>Dark theme <span class="chip">fg bg | bg left | muted right</span></h2>
    <div class="stage">
      <div class="size-l"></div>
      <div class="size-m"></div>
      <div class="size-s"></div>
    </div>
  </section>
</div>

<script>
  const tpl = document.getElementById('tpl-dblp');
  document.querySelectorAll('.stage > div').forEach(slot => {
    const svg = tpl.content.firstElementChild.cloneNode(true);
    slot.appendChild(svg);
  });
</script>

</body>
</html>
